<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Trainer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <header>
        🇫🇷 French Trainer
    </header>

    <main id="chat">

        <div class="bot message">
            Bonjour Ana ! Comment ça va aujourd'hui ?
        </div>

    </main>

    <footer>
        <input
            type="text"
            id="messageInput"
            placeholder="Digite em francês..."
        >

        <button onclick="sendMessage()">
            ➤
        </button>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
